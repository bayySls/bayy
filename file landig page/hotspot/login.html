<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.9">
  <title>Login - MineNET</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: url('minecraft-bg.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }

    /* Animasi Mob */
    .mob {
      position: absolute;
      width: 90px;
      animation: mobMove 18s infinite linear;
      filter: drop-shadow(0 0 10px rgba(4, 8, 4, 0.6));
      pointer-events: none;
    }

    .mob.creeper { top: 10%; left: 100px; }
    .mob.steve   { bottom: 10%; right: -100px; animation-duration: 22s; }

    @keyframes mobMove {
      0%   { transform: translateX(0); }
      100% { transform: translateX(120vw); }
    }

    @keyframes mobMove {
      0%   { transform: translateX(0); }
      100% { transform: translateX(120vw); }
    }





    /* Container Login */
    .container-login {
      background: rgba(0, 0, 0, 0.8);
      padding: 25px;
      width: 320px;
      border-radius: 10px;
      text-align: center;
      border: 3px solid #3fa93f;
      box-shadow: 0 0 30px rgba(0,255,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 1;
    }

    .title {
      font-size: 22px;
      letter-spacing: 2px;
      color: #6bff6b;
      text-shadow: 0 0 10px #00ff00;
      margin-bottom: 5px;
    }

    .sub-title {
      font-size: 12px;
      color: #ccc;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      background: #1b1b1b;
      border: 2px solid #4caf50;
      border-radius: 6px;
      color: #fff;
      outline: none;
    }

    input:focus {
      border-color: #00ff00;
      box-shadow: 0 0 10px #00ff00;
    }

    .btn-submit {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      color: #000;
      background: linear-gradient(90deg, #00ff00, #9aff00);
      box-shadow: 0 0 15px #00ff00;
    }

    .btn-submit:hover {
      background: linear-gradient(90deg, #9aff00, #00ff00);
    }

    .menu-items {
      margin-top: 18px;
      padding: 10px;
      border: 2px dashed #6bff6b;
      font-size: 12px;
      color: #caffca;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <!-- Mob Animasi -->
  <img src="creepers.png" class="mob creeper" alt="Creeper">
  <img src="steve.png" class="mob steve" alt="Steve">

  <div class="container-login">
    <div class="title">MINE NET</div>
    <div class="sub-title">Survival • Network • Craft</div>

    <!-- LOGIN MIKROTIK -->
    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post">
      <input type="hidden" name="username" />
      <input type="hidden" name="password" />
      <input type="hidden" name="dst" value="$(link-orig)" />
      <input type="hidden" name="popup" value="true" />
    </form>

    <script src="/md5.js"></script>
    <script>
      function doLogin() {
        document.sendin.username.value = document.login.username.value;
        document.sendin.password.value =
          hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
        document.sendin.submit();
        return false;
      }
    </script>
    $(endif)

    <form name="login" action="$(link-login-only)" method="post"
      $(if chap-id) onsubmit="return doLogin()" $(endif)>
      
      <input type="hidden" name="dst" value="$(link-orig)">
      <input type="hidden" name="popup" value="true">

      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit" class="btn-submit">ENTER SERVER</button>
    </form>

    <div class="menu-items">
      Jangan AFK ❌<br>
      Mining 24 Jam ⛏️<br>
      Rp 2.000 bukan miskin 😄
    </div>
  </div>

<script>
  document.login.username.focus();
</script>

</body>
</html>

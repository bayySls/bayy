<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wifi Bayy</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(#0d7529, #000000);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

 .amongus-character {
      position: absolute;
      z-index: 999;
      pointer-events: none;
      filter: drop-shadow(0 0 10px rgba(193, 255, 7, 0.5));
    }

    .pink { width: 130px; animation: moveInside1 20s infinite ease-in-out; }
    .blue { width: 170px; animation: moveInside2 25s infinite ease-in-out; }
    .pedang { width: 100px; animation: moveInside3 30s infinite ease-in-out; }
    .picaxe { width: 60px; animation: moveInside4 30s infinite ease-in-out; }


    @keyframes moveInside1 {
      0%   { top: 10%; left: 10%; transform: rotate(0deg); }
      25%  { top: 10%; left: 80%; transform: rotate(90deg); }
      50%  { top: 80%; left: 80%; transform: rotate(180deg); }
      75%  { top: 80%; left: 10%; transform: rotate(270deg); }
      100% { top: 10%; left: 10%; transform: rotate(360deg); }
    }

    @keyframes moveInside2 {
      0%   { top: 80%; left: 80%; transform: rotate(0deg); }
      33%  { top: 20%; left: 50%; transform: rotate(-120deg); }
      66%  { top: 70%; left: 10%; transform: rotate(-240deg); }
      100% { top: 80%; left: 80%; transform: rotate(-360deg); }
    }

    @keyframes moveInside3 {
      0%   { top: 40%; left: 80%; transform: rotate(0deg); }
      33%  { top: 20%; left: 50%; transform: rotate(-150deg); }
      66%  { top: 60%; left: 10%; transform: rotate(-230deg); }
      100% { top: 30%; left: 80%; transform: rotate(-360deg); }
    }

    @keyframes moveInside4 {
      0%   { top: 10%; left: 10%; transform: rotate(0deg); }
      25%  { top: 10%; left: 80%; transform: rotate(90deg); }
      50%  { top: 80%; left: 80%; transform: rotate(180deg); }
      75%  { top: 80%; left: 10%; transform: rotate(270deg); }
      100% { top: 10%; left: 10%; transform: rotate(360deg); }
    }

    .container {
      width: 100%;
      max-width: 360px;
      padding: 20px;
    }

    .title {
      background: #405840;
      border: 5px solid #1f3f1f;
      text-align: center;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: inset -4px -4px #1f3f1f;
    }

    .title h1 {
      font-size: 20px;
      text-shadow: 2px 2px #000000;
      line-height: 1.4;
      font-style: italic;
    }

    .login-box {
      background:url(images.jpg) no-repeat center center fixed;
      border: 15px solid #1f3f1f;
      padding: 2px;
      box-shadow: inset -4px -4px #1f3f1f;
    }
      
    

    .login-box h2 {
      text-align: center;
      margin-bottom: 5px;
      font-size: 18px;
      text-shadow: 1px 1px #000;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 4px solid #1f3f1f;
      background: #fcfffa;
      font-size: 14px;
    }

    .login-box input::placeholder {
      color: #000000;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #7fbf3f;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      border: 4px solid #4a7a1f;
      box-shadow: inset -3px -3px #4a7a1f;
      cursor: pointer;
    }

    .login-box button:active {
      box-shadow: inset 3px 3px #4a7a1f;
    }

    .info {
      text-align: center;
      font-size: 12px;
      margin-left: auto;
      opacity: 0.9;
    }

    .footer {
      text-align: center;
      font-size: 15px;
      margin-top: 16px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<img src="creepers.png" alt="Among Us Pink" class="amongus-character pink">
  <img src="golem.png" alt="Among Us Blue" class="amongus-character blue">
<img src="pedang.png" alt="Among Us Blue" class="amongus-character pedang">
<img src="zombie.png" alt="Among Us Blue" class="amongus-character picaxe">

  <div class="container">

    <div class="title">
      <h1>
        SELAMAT DATANG DI NET<br>
        <strong>Bayy Batu</strong>
      </h1>
    </div>

    <div class="login-box">
      <h2>CODE HERE</h2>

      <!-- FORM LOGIN HOTSPOT -->
      <form method="post" action="$(link-login-only)">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <input type="hidden" name="dst" value="$(link-orig)">
        <input type="hidden" name="popup" value="true">

        <button type="submit">MASUK</button>
      </form>

      <div class="info">
        
      </div>
    </div>

    <div class="footer">
      © BayySL
    </div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Wifi Bayy</title>

  
  <script src="/md5.js"></script>
  <script>
    function doLogin() {
      document.sendin.username.value = document.login.username.value;
      document.sendin.password.value =
        hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
      document.sendin.submit();
      return false;
    }
  </script>
  

  <style>
    /* CSS KAMU TIDAK DIUBAH */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(#0d7529, #000000);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .amongus-character {
      position: absolute;
      z-index: 999;
      pointer-events: none;
      filter: drop-shadow(0 0 10px rgba(193, 255, 7, 0.5));
    }

    .pink { width: 130px; animation: moveInside1 20s infinite ease-in-out; }
    .blue { width: 170px; animation: moveInside2 25s infinite ease-in-out; }
    .pedang { width: 100px; animation: moveInside3 30s infinite ease-in-out; }
    .picaxe { width: 60px; animation: moveInside4 30s infinite ease-in-out; }

    @keyframes moveInside1 {
      0% { top: 10%; left: 10%; }
      50% { top: 80%; left: 80%; }
      100% { top: 10%; left: 10%; }
    }

    @keyframes moveInside2 {
      0% { top: 80%; left: 80%; }
      50% { top: 20%; left: 20%; }
      100% { top: 80%; left: 80%; }
    }

    @keyframes moveInside3 {
      0% { top: 40%; left: 80%; }
      50% { top: 60%; left: 10%; }
      100% { top: 40%; left: 80%; }
    }

    @keyframes moveInside4 {
      0% { top: 10%; left: 10%; }
      50% { top: 80%; left: 80%; }
      100% { top: 10%; left: 10%; }
    }

    .container {
      width: 100%;
      max-width: 360px;
      padding: 20px;
    }

    .title {
      background: #405840;
      border: 5px solid #1f3f1f;
      text-align: center;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: inset -4px -4px #1f3f1f;
    }

    .title h1 {
      font-size: 20px;
      text-shadow: 2px 2px #000;
      font-style: italic;
    }

    .login-box {
      background:url(images.jpg) no-repeat center center;
      background-size: cover;
      border: 15px solid #1f3f1f;
      padding: 10px;
      box-shadow: inset -4px -4px #1f3f1f;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 4px solid #1f3f1f;
      background: #fcfffa;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #7fbf3f;
      color: #fff;
      font-weight: bold;
      border: 4px solid #4a7a1f;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>

<body>


<form name="sendin" action="$(link-login-only)" method="post" style="display:none">
  <input type="hidden" name="username" />
  <input type="hidden" name="password" />
  <input type="hidden" name="dst" value="$(link-orig)" />
  <input type="hidden" name="popup" value="true" />
</form>


<img src="creepers.png" class="amongus-character pink">
<img src="golem.png" class="amongus-character blue">
<img src="pedang.png" class="amongus-character pedang">
<img src="zombie.png" class="amongus-character picaxe">

<div class="container">

  <div class="title">
    <h1>SELAMAT DATANG DI NET<br><strong>Bayy Batu</strong></h1>
  </div>

  <div class="login-box">
    <h2>LOGIN</h2>

    <form name="login" action="$(link-login-only)" method="post"
      $(if chap-id) onSubmit="return doLogin()" $(endif)>

      <input type="hidden" name="dst" value="$(link-orig)" />
      <input type="hidden" name="popup" value="true" />

      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">MASUK</button>
    </form>

  </div>

  <div class="footer">
    © BayySL
  </div>

</div>

</body>
</html>
